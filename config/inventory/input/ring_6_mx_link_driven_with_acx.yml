topology: links
platform: mixed
mode: qkd
pki_profile: hierarchical_ca

devices:

  - name: MX1
    platform: mx
    ip: 100.123.113.151
    kme:
      ip: 100.123.252.15
      port: 8443
    interfaces:
      - et-0/0/0
      - et-0/0/2

  - name: MX2
    platform: mx
    ip: 100.123.113.152
    kme:
      ip: 100.123.252.16
      port: 8443
    interfaces:
      - et-0/0/0
      - et-0/0/2

  - name: MX3
    platform: mx
    ip: 100.123.113.2
    kme:
      ip: 100.123.252.17
      port: 8443
    interfaces:
      - et-0/0/7
      - et-0/0/4
      - et-0/0/6
      - et-0/0/8

  - name: MX4
    platform: mx
    ip: 100.123.113.4
    kme:
      ip: 100.123.252.18
      port: 8443
    interfaces:
      - et-0/0/4
      - et-0/0/0
      - et-0/0/6
      - et-0/0/8

  - name: MX5
    platform: mx
    ip: 100.123.113.3
    kme:
      ip: 100.123.252.19
      port: 8443
    interfaces:
      - et-0/0/0
      - et-0/0/4
      - et-0/0/6
      - et-0/0/8

  - name: MX6
    platform: mx
    ip: 100.123.113.1
    kme:
      ip: 100.123.252.20
      port: 8443
    interfaces:
      - et-0/0/4
      - et-0/0/7
      - et-0/0/6
      - et-0/0/8

  - name: ACX1
    platform: acx
    ip: 100.123.170.202
    kme:
      ip: 100.123.252.10
      port: 8443
    interfaces:
      - et-2/0/0
      - et-2/0/2
      - et-2/0/4

  - name: ACX2
    platform: acx
    ip: 100.123.170.201
    kme:
      ip: 100.123.252.11
      port: 8443
    managed: false
    interfaces:
      - et-2/0/0
      - et-2/0/2

  - name: ACX3
    platform: acx
    ip: 100.123.170.203
    kme:
      ip: 100.123.252.12
      port: 8443
    interfaces:
      - et-2/0/0
      - et-2/0/2
      - et-2/0/4

  - name: ACX4
    platform: acx
    ip: 100.123.170.204
    kme:
      ip: 100.123.252.13
      port: 8443
    managed: false
    interfaces:
      - et-0/0/2

  - name: ACX5
    platform: acx
    ip: 100.123.170.205
    kme:
      ip: 100.123.252.14
      port: 8443
    managed: false
    interfaces:
      - et-0/0/2

links:

  #
  # MX ring links
  #

  - id: MX1-MX2
    type: ring
    node_a: MX1
    interface_a: et-0/0/0
    node_b: MX2
    interface_b: et-0/0/0
    ca_name: CA_MX1_MX2
    keychain_name: QKD_CA_MX1_MX2

  - id: MX2-MX3
    type: ring
    node_a: MX2
    interface_a: et-0/0/2
    node_b: MX3
    interface_b: et-0/0/7
    ca_name: CA_MX2_MX3
    keychain_name: QKD_CA_MX2_MX3

  - id: MX3-MX4
    type: ring
    node_a: MX3
    interface_a: et-0/0/4
    node_b: MX4
    interface_b: et-0/0/4
    ca_name: CA_MX3_MX4
    keychain_name: QKD_CA_MX3_MX4

  - id: MX4-MX5
    type: ring
    node_a: MX4
    interface_a: et-0/0/0
    node_b: MX5
    interface_b: et-0/0/0
    ca_name: CA_MX4_MX5
    keychain_name: QKD_CA_MX4_MX5

  - id: MX5-MX6
    type: ring
    node_a: MX5
    interface_a: et-0/0/4
    node_b: MX6
    interface_b: et-0/0/4
    ca_name: CA_MX5_MX6
    keychain_name: QKD_CA_MX5_MX6

  - id: MX6-MX1
    type: ring
    node_a: MX6
    interface_a: et-0/0/7
    node_b: MX1
    interface_b: et-0/0/2
    ca_name: CA_MX6_MX1
    keychain_name: QKD_CA_MX6_MX1

  #
  # MX internal mesh/chord links
  #

  - id: MX3-MX5
    type: extra
    node_a: MX3
    interface_a: et-0/0/6
    node_b: MX5
    interface_b: et-0/0/6
    ca_name: CA_MX3_MX5
    keychain_name: QKD_CA_MX3_MX5

  - id: MX3-MX6
    type: extra
    node_a: MX3
    interface_a: et-0/0/8
    node_b: MX6
    interface_b: et-0/0/8
    ca_name: CA_MX3_MX6
    keychain_name: QKD_CA_MX3_MX6

  - id: MX4-MX6
    type: extra
    node_a: MX4
    interface_a: et-0/0/6
    node_b: MX6
    interface_b: et-0/0/6
    ca_name: CA_MX4_MX6
    keychain_name: QKD_CA_MX4_MX6

  #
  # New MX <-> ACX interworking links
  #

  - id: MX5-ACX1
    type: extra
    node_a: MX5
    interface_a: et-0/0/8
    node_b: ACX1
    interface_b: et-2/0/0
    ca_name: CA_MX5_ACX1
    keychain_name: QKD_CA_MX5_ACX1

  - id: MX4-ACX3
    type: extra
    node_a: MX4
    interface_a: et-0/0/8
    node_b: ACX3
    interface_b: et-2/0/0
    ca_name: CA_MX4_ACX3
    keychain_name: QKD_CA_MX4_ACX3

  #
  # Existing ACX1 links to preserve during ACX1 qkd_onbox redeploy
  #

  - id: ACX1-ACX2
    type: existing
    node_a: ACX1
    interface_a: et-2/0/4
    node_b: ACX2
    interface_b: et-2/0/0
    managed_b: false
    ca_name: CA1
    keychain_name: QKD_CA1

  - id: ACX1-ACX5
    type: existing
    node_a: ACX1
    interface_a: et-2/0/2
    node_b: ACX5
    interface_b: et-0/0/2
    managed_b: false
    ca_name: CA9
    keychain_name: QKD_CA9

  #
  # Existing ACX3 links to preserve during ACX3 qkd_onbox redeploy
  #

  - id: ACX3-ACX2
    type: existing
    node_a: ACX3
    interface_a: et-2/0/4
    node_b: ACX2
    interface_b: et-2/0/2
    managed_b: false
    ca_name: CA3
    keychain_name: QKD_CA3

  - id: ACX3-ACX4
    type: existing
    node_a: ACX3
    interface_a: et-2/0/2
    node_b: ACX4
    interface_b: et-0/0/2
    managed_b: false
    ca_name: CA5
    keychain_name: QKD_CA5
