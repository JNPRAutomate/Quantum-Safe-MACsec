    node_b: MX6
    interface_b: et-0/0/6

  # MX -> ACX interworking links

  - id: MX5-ACX1
    type: macsec
    node_a: MX5
    interface_a: et-0/0/8
    node_b: ACX1
    interface_b: et-2/0/0

  - id: MX4-ACX3
    type: macsec
    node_a: MX4
    interface_a: et-0/0/8
    node_b: ACX3
