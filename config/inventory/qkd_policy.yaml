qkd_policy:
  rekey_enabled: true
  batch_enabled: true
  interval_seconds: 60 # within range (60..2592000)

  script_user_rotation_seconds: -1 # macsec_user SSH key rotation: -1 = disabled
  peer_cmd_rotation_seconds: -1 # etsi_peer_view SSH key rotation: -1 = disabled (re-enable: set > 0)

  key_batch_size: 5
  max_installed_keys: 5

  key_ttl_seconds: 0

  purge_on_kme_loss: false
  purge_after_seconds: 0