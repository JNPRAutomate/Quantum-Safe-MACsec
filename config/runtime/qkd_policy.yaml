qkd_policy:
  rekey_enabled: true
  batch_enabled: true
  interval_seconds: 60
  # v3.3.2 SSH Key Rotation Settings:
  # - script_user_rotation_seconds (macsec_user): DISABLED (-1) to maintain peer SSH sync stability
  #   Reason: Phase 2 SSH key sync caused asymmetry (peer A -> B works, B -> A fails)
  #   Impact: macsec_user key is now static throughout deployment lifecycle
  #   TODO: Re-enable when Phase 2 SSH sync issue is resolved
  # SSH Key Rotation: set to -1 to disable. Re-enable once deploy is stable.
  script_user_rotation_seconds: -1
  peer_cmd_rotation_seconds: -1
  key_batch_size: 5
  max_installed_keys: 5
  key_ttl_seconds: 0
  purge_on_kme_loss: false
  purge_after_seconds: 0
